<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שגרת הטיפוח של שימי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;700&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg-cream: #f5ede4;
    --bg-paper: #fbf6ef;
    --rose-deep: #b8729a;
    --rose-soft: #d4a5c4;
    --rose-pale: #f0d8e6;
    --terracotta: #c47a5a;
    --sage: #8aab8e;
    --sand: #d4b896;
    --gold: #b8923e;
    --ink: #3d2c3a;
    --ink-soft: #6b5562;
    --ink-mute: #9a8a92;
    --line: #e0d4cc;
  }

  html, body {
    background: var(--bg-cream);
    color: var(--ink);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top right, rgba(184, 114, 154, 0.08), transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(196, 122, 90, 0.06), transparent 60%),
      var(--bg-cream);
    padding: 24px 16px 40px;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose-soft), transparent);
    opacity: 0.5;
  }

  .header-inner {
    background: var(--bg-cream);
    display: inline-block;
    padding: 0 20px;
    position: relative;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 32px;
    color: var(--rose-deep);
    letter-spacing: 1px;
    line-height: 1;
  }

  .subtitle {
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 300;
  }

  /* Day picker */
  .day-picker {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 24px;
    background: var(--bg-paper);
    padding: 8px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(61, 44, 58, 0.04);
  }

  .day-btn {
    background: transparent;
    border: none;
    border-radius: 10px;
    padding: 10px 4px;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: 'Heebo', sans-serif;
    color: var(--ink-soft);
    text-align: center;
  }

  .day-btn .day-name {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .day-btn .day-icon {
    font-size: 14px;
  }

  .day-btn.today {
    background: var(--rose-pale);
    color: var(--rose-deep);
  }

  .day-btn.active {
    background: var(--rose-deep);
    color: white;
    box-shadow: 0 2px 8px rgba(184, 114, 154, 0.35);
  }

  .day-btn.active .day-icon { color: var(--sand); }

  /* Date strip */
  .date-strip {
    text-align: center;
    margin-bottom: 24px;
    font-family: 'Cormorant Garamond', serif;
  }

  .date-strip .day-label {
    font-size: 14px;
    color: var(--ink-mute);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .date-strip .day-title {
    font-size: 28px;
    color: var(--ink);
    font-weight: 500;
    margin-top: 4px;
  }

  .date-strip .day-type {
    font-size: 13px;
    color: var(--terracotta);
    margin-top: 6px;
    font-style: italic;
    font-family: 'Heebo', sans-serif;
  }

  /* Time toggle */
  .time-toggle {
    display: flex;
    background: var(--bg-paper);
    border-radius: 100px;
    padding: 4px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(61, 44, 58, 0.04);
  }

  .time-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-weight: 500;
  }

  .time-btn.active {
    background: linear-gradient(135deg, var(--rose-deep), var(--rose-soft));
    color: white;
    box-shadow: 0 2px 12px rgba(184, 114, 154, 0.3);
  }

  /* Routine card */
  .routine-section {
    background: var(--bg-paper);
    border-radius: 20px;
    padding: 20px 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(61, 44, 58, 0.05);
    position: relative;
    overflow: hidden;
  }

  .routine-section::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at top right, rgba(184, 114, 154, 0.1), transparent 70%);
    pointer-events: none;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--line);
  }

  .section-title .icon {
    font-size: 18px;
  }

  .section-title h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
  }

  .section-title .badge {
    margin-right: auto;
    font-size: 10px;
    color: var(--ink-mute);
    background: var(--bg-cream);
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
  }

  /* Step item */
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 10px;
    background: white;
    border-radius: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 1px solid transparent;
  }

  .step:hover {
    border-color: var(--rose-pale);
  }

  .step.checked {
    background: var(--rose-pale);
    border-color: var(--rose-soft);
  }

  .step.checked .step-name {
    color: var(--ink-mute);
    text-decoration: line-through;
    text-decoration-color: var(--rose-soft);
    text-decoration-thickness: 1.5px;
  }

  .step-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--rose-soft);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    background: var(--bg-paper);
  }

  .step.checked .step-checkbox {
    background: var(--rose-deep);
    border-color: var(--rose-deep);
  }

  .step.checked .step-checkbox::after {
    content: '✓';
    color: white;
    font-size: 13px;
    font-weight: bold;
  }

  .step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: var(--rose-deep);
    font-weight: 600;
    width: 16px;
    text-align: center;
  }

  .step-content {
    flex: 1;
  }

  .step-name {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  .step-area {
    display: inline-block;
    font-size: 10px;
    color: var(--ink-mute);
    background: var(--bg-cream);
    padding: 2px 8px;
    border-radius: 100px;
    margin-right: 6px;
    letter-spacing: 0.3px;
  }

  .step-area.face { background: #f5ebf2; color: #9b3d7a; }
  .step-area.neck { background: #f5efde; color: #8a6d2a; }
  .step-area.eye { background: #e8f0f5; color: #3d6480; }

  .target-tag {
    display: inline-block;
    font-size: 9.5px;
    padding: 2px 7px;
    border-radius: 100px;
    margin-right: 4px;
    letter-spacing: 0.2px;
    font-weight: 500;
    vertical-align: middle;
  }

  .target-tag.both {
    background: linear-gradient(135deg, #f5ebf2, #f5efde);
    color: #6b3d5a;
  }

  .target-tag.face {
    background: #f5ebf2;
    color: #9b3d7a;
  }

  .target-tag.neck {
    background: #f5efde;
    color: #8a6d2a;
  }

  /* Progress */
  .progress-card {
    background: linear-gradient(135deg, var(--rose-pale), #f8e5ed);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-text {
    flex: 1;
  }

  .progress-text .label {
    font-size: 11px;
    color: var(--rose-deep);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .progress-text .count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--ink);
    font-weight: 600;
  }

  .progress-ring {
    width: 60px;
    height: 60px;
    position: relative;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
  }

  .progress-ring circle {
    fill: none;
    stroke-width: 4;
  }

  .progress-bg {
    stroke: rgba(184, 114, 154, 0.2);
  }

  .progress-fill {
    stroke: var(--rose-deep);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  .progress-percent {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--rose-deep);
    font-weight: 600;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-mute);
    font-style: italic;
  }

  /* Tips card */
  .tips-card {
    background: linear-gradient(135deg, #fef5e1 0%, #fde8d1 100%);
    border-radius: 14px;
    padding: 14px 16px;
    margin-top: 16px;
    border-right: 3px solid var(--terracotta);
  }

  .tips-card .tip-title {
    font-size: 12px;
    color: var(--terracotta);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .tips-card .tip-text {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }

  /* Reset btn */
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    padding: 12px;
    border-radius: 100px;
    color: var(--ink-mute);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    margin-top: 12px;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
  }

  .reset-btn:hover {
    color: var(--rose-deep);
    border-color: var(--rose-soft);
  }

  /* Decorative element */
  .ornament {
    text-align: center;
    color: var(--rose-soft);
    font-size: 16px;
    margin: 8px 0 16px;
    letter-spacing: 12px;
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: fadeIn 0.4s ease;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-inner">
      <h1>שגרת שימי</h1>
      <div class="subtitle">SKINCARE RITUAL</div>
    </div>
  </div>

  <div class="day-picker" id="dayPicker"></div>

  <div class="date-strip">
    <div class="day-label" id="dayLabel">יום שלישי</div>
    <div class="day-title" id="dayTitle">רטינואיד</div>
    <div class="day-type" id="dayDate"></div>
  </div>

  <div class="ornament">✦ ✦ ✦</div>

  <div class="time-toggle">
    <button class="time-btn active" data-time="morning">☀️ בוקר</button>
    <button class="time-btn" data-time="evening">🌙 ערב</button>
  </div>

  <div class="progress-card">
    <div class="progress-text">
      <div class="label">התקדמות יומית</div>
      <div class="count" id="progressCount">0 מתוך 0</div>
    </div>
    <div class="progress-ring">
      <svg width="60" height="60">
        <circle class="progress-bg" cx="30" cy="30" r="26"></circle>
        <circle class="progress-fill" cx="30" cy="30" r="26"
          stroke-dasharray="163.36" stroke-dashoffset="163.36" id="progressFill"></circle>
      </svg>
      <div class="progress-percent" id="progressPercent">0%</div>
    </div>
  </div>

  <div id="routineContainer"></div>

  <button class="reset-btn" id="resetBtn">איפוס סימוני היום</button>

</div>

<script>
const days = [
  { id: 0, name: 'א', full: 'יום ראשון', type: 'רטינואיד', icon: '🌙' },
  { id: 1, name: 'ב', full: 'יום שני', type: 'פפטידים מלא', icon: '🌿' },
  { id: 2, name: 'ג', full: 'יום שלישי', type: 'רטינואיד', icon: '🌙' },
  { id: 3, name: 'ד', full: 'יום רביעי', type: 'פפטידים + מסכת VT', icon: '✨' },
  { id: 4, name: 'ה', full: 'יום חמישי', type: 'רטינואיד', icon: '🌙' },
  { id: 5, name: 'ו', full: 'יום שישי', type: 'לילה מפנק', icon: '🌹' },
  { id: 6, name: 'ש', full: 'יום שבת', type: 'פפטידים מלא', icon: '🌿' },
];

const morningRoutine = {
  combined: [
    { name: 'Vitamin C 15%', area: 'פנים + צוואר' },
    { name: 'SPF 50+ Anthelios', area: 'פנים + צוואר' },
  ],
};

const eveningRoutines = {
  0: { // ראשון - רטינואיד
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'Ret-A 0.025%', target: 'face', tip: 'שכבה דקה • לחכות 15-20 דק׳ אחרי הניקוי' },
      { name: 'Retinol Boost+', target: 'neck' },
      { name: 'Jelly Cream', target: 'both' },
    ],
  },
  1: { // שני - פפטידים מלא
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'APIS Hyaluron 4D', target: 'both' },
      { name: 'Matrixyl 10%', target: 'both' },
      { name: 'Argireline 10%', target: 'face' },
      { name: 'Copper Peptides', target: 'both' },
      { name: 'Jelly Cream', target: 'both' },
    ],
  },
  2: { // שלישי - רטינואיד
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'Ret-A 0.025%', target: 'face', tip: 'שכבה דקה • לחכות 15-20 דק׳ אחרי הניקוי' },
      { name: 'Retinol Boost+', target: 'neck' },
      { name: 'Jelly Cream', target: 'both' },
    ],
  },
  3: { // רביעי - פפטידים + VT
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'מסכת VT Cica', target: 'face', tip: '15-20 דקות' },
      { name: 'APIS Hyaluron 4D', target: 'both' },
      { name: 'Matrixyl 10%', target: 'face' },
      { name: 'Argireline 10%', target: 'both' },
      { name: 'Copper Peptides', target: 'both' },
      { name: 'Jelly Cream', target: 'both' },
    ],
  },
  4: { // חמישי - רטינואיד
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'Ret-A 0.025%', target: 'face', tip: 'שכבה דקה • לחכות 15-20 דק׳ אחרי הניקוי' },
      { name: 'Retinol Boost+', target: 'neck' },
      { name: 'Jelly Cream', target: 'both' },
    ],
  },
  5: { // שישי - לילה מפנק
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'APIS Hyaluron 4D', target: 'both' },
      { name: 'Matrixyl 10%', target: 'both' },
      { name: 'Argireline 10%', target: 'face' },
      { name: 'Copper Peptides', target: 'both' },
      { name: 'Night Wrapping Mask', target: 'both' },
    ],
  },
  6: { // שבת - פפטידים
    eye: [{ name: 'Crystal Retinal Eye 3', area: 'עיניים' }],
    steps: [
      { name: 'APIS Hyaluron 4D', target: 'both' },
      { name: 'Matrixyl 10%', target: 'face' },
      { name: 'Argireline 10%', target: 'both' },
      { name: 'Copper Peptides', target: 'face' },
      { name: 'Jelly Cream', target: 'both' },
    ],
  },
};

let currentDay = new Date().getDay();
let currentTime = 'morning';
let checkedSteps = {}; // {dayKey-time-stepIdx: true}

// Storage - using localStorage for cross-browser persistence
function loadProgress() {
  try {
    const raw = localStorage.getItem('shimi-skincare-checked');
    if (raw) {
      const data = JSON.parse(raw);
      // Reset if from different date
      const today = new Date().toDateString();
      if (data.date === today) {
        checkedSteps = data.checked || {};
      } else {
        // New day - clear and save fresh
        checkedSteps = {};
        saveProgress();
      }
    }
  } catch (e) {
    console.error('Load failed', e);
  }
}

function saveProgress() {
  try {
    localStorage.setItem('shimi-skincare-checked', JSON.stringify({
      date: new Date().toDateString(),
      checked: checkedSteps
    }));
  } catch (e) {
    console.error('Save failed', e);
  }
}

function buildDayPicker() {
  const picker = document.getElementById('dayPicker');
  picker.innerHTML = '';
  const today = new Date().getDay();

  days.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-btn';
    if (day.id === today) btn.classList.add('today');
    if (day.id === currentDay) btn.classList.add('active');
    btn.innerHTML = `
      <div class="day-name">${day.name}</div>
      <div class="day-icon">${day.icon}</div>
    `;
    btn.addEventListener('click', () => {
      currentDay = day.id;
      buildDayPicker();
      renderRoutine();
    });
    picker.appendChild(btn);
  });
}

function updateDateStrip() {
  const day = days[currentDay];
  document.getElementById('dayLabel').textContent = day.full;
  document.getElementById('dayTitle').textContent = day.type;

  const today = new Date().getDay();
  if (currentDay === today) {
    const date = new Date();
    const dateStr = date.toLocaleDateString('he-IL', { day: 'numeric', month: 'long' });
    document.getElementById('dayDate').textContent = `היום • ${dateStr}`;
  } else {
    document.getElementById('dayDate').textContent = '';
  }
}

function getRoutineSteps() {
  if (currentTime === 'morning') {
    return {
      'combined': morningRoutine.combined,
    };
  } else {
    const r = eveningRoutines[currentDay];
    return {
      'eye': r.eye,
      'body': r.steps,
    };
  }
}

function getTargetLabel(target) {
  if (target === 'both') return { text: 'פנים + צוואר', class: 'both' };
  if (target === 'face') return { text: 'פנים בלבד', class: 'face' };
  if (target === 'neck') return { text: 'צוואר בלבד', class: 'neck' };
  return null;
}

function renderRoutine() {
  updateDateStrip();
  const container = document.getElementById('routineContainer');
  container.innerHTML = '';
  container.classList.remove('fade-in');
  void container.offsetWidth; // force reflow
  container.classList.add('fade-in');

  const steps = getRoutineSteps();
  const sectionTitles = {
    eye: { icon: '👁', label: 'עיניים', badge: 'תמיד ראשון' },
    body: { icon: '🌸', label: 'פנים + צוואר', badge: '' },
    combined: { icon: '🌸', label: 'פנים + צוואר', badge: '' },
  };

  ['eye', 'body', 'combined'].forEach(section => {
    if (!steps[section] || steps[section].length === 0) return;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'routine-section';

    const titleInfo = sectionTitles[section];
    const badgeHtml = (section === 'eye' && currentTime === 'evening')
      ? `<span class="badge">תמיד ראשון</span>` : '';

    sectionEl.innerHTML = `
      <div class="section-title">
        <span class="icon">${titleInfo.icon}</span>
        <h2>${titleInfo.label}</h2>
        ${badgeHtml}
      </div>
    `;

    steps[section].forEach((step, idx) => {
      const stepKey = `${currentDay}-${currentTime}-${section}-${idx}`;
      const isChecked = checkedSteps[stepKey];
      const tipHtml = step.tip ? `<div style="font-size:11px;color:var(--ink-mute);margin-top:3px;font-style:italic;">${step.tip}</div>` : '';

      // Build target tag if exists
      let targetTagHtml = '';
      if (step.target) {
        const tag = getTargetLabel(step.target);
        if (tag) {
          targetTagHtml = `<span class="target-tag target-${tag.class}">${tag.text}</span>`;
        }
      }

      const stepEl = document.createElement('div');
      stepEl.className = 'step' + (isChecked ? ' checked' : '');
      stepEl.innerHTML = `
        <div class="step-checkbox"></div>
        <div class="step-num">${idx + 1}</div>
        <div class="step-content">
          <div class="step-name">${step.name} ${targetTagHtml}</div>
          ${tipHtml}
        </div>
      `;
      stepEl.addEventListener('click', () => {
        checkedSteps[stepKey] = !checkedSteps[stepKey];
        saveProgress();
        renderRoutine();
      });
      sectionEl.appendChild(stepEl);
    });

    container.appendChild(sectionEl);
  });

  // Add tip box for evening Ret-A days
  if (currentTime === 'evening' && (currentDay === 0 || currentDay === 2 || currentDay === 4)) {
    const tipBox = document.createElement('div');
    tipBox.className = 'tips-card';
    tipBox.innerHTML = `
      <div class="tip-title">💡 חשוב לזכור</div>
      <div class="tip-text">
        אחרי הניקוי, להמתין 10-15 דק׳ עד שהעור יבש לגמרי.<br>
        Ret-A — רק על הפנים (לא על הצוואר ולא סביב העיניים).<br>
        אחרי Ret-A: עוד 15-20 דק׳ לפני ה-Jelly Cream.
      </div>
    `;
    container.appendChild(tipBox);
  }

  if (currentTime === 'evening' && currentDay === 3) {
    const tipBox = document.createElement('div');
    tipBox.className = 'tips-card';
    tipBox.innerHTML = `
      <div class="tip-title">✨ לילה מיוחד</div>
      <div class="tip-text">מסכת VT Cica קודם, על פנים נקיות. להניח 15-20 דקות, להוריד, ואז להמשיך עם הסרומים.</div>
    `;
    container.appendChild(tipBox);
  }

  if (currentTime === 'evening' && currentDay === 5) {
    const tipBox = document.createElement('div');
    tipBox.className = 'tips-card';
    tipBox.innerHTML = `
      <div class="tip-title">🌹 לילה מפנק</div>
      <div class="tip-text">ה-Night Wrapping Mask משמש כסוגר במקום ה-Jelly Cream — שכבה עוטפת ומזינה לאורך הלילה.</div>
    `;
    container.appendChild(tipBox);
  }

  updateProgress();
}

function updateProgress() {
  const steps = getRoutineSteps();
  let total = 0, done = 0;

  Object.keys(steps).forEach(section => {
    steps[section].forEach((_, idx) => {
      total++;
      const key = `${currentDay}-${currentTime}-${section}-${idx}`;
      if (checkedSteps[key]) done++;
    });
  });

  document.getElementById('progressCount').textContent = `${done} מתוך ${total}`;
  const percent = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressPercent').textContent = `${percent}%`;

  const circumference = 2 * Math.PI * 26;
  const offset = circumference - (percent / 100) * circumference;
  document.getElementById('progressFill').style.strokeDashoffset = offset;
}

// Time toggle
document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTime = btn.dataset.time;
    renderRoutine();
  });
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  // Clear only current day
  Object.keys(checkedSteps).forEach(key => {
    if (key.startsWith(`${currentDay}-`)) {
      delete checkedSteps[key];
    }
  });
  saveProgress();
  renderRoutine();
});

// Init
(function init() {
  loadProgress();
  buildDayPicker();
  renderRoutine();
})();
</script>

</body>
</html>
